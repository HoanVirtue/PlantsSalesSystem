<div class="breadcrumb-area">
  <div class="top-breadcrumb-area bg-img bg-overlay d-flex align-items-center justify-content-center"
       style="background-image: url(img/bg-img/24.jpg);">
    <h2>{{ title }}</h2>
  </div>
  <div class="container">
    <div class="row">
      <div class="col-12">
        <nav aria-label="breadcrumb">
          <ol class="breadcrumb">
            <li class="breadcrumb-item">
              <a [routerLink]="['/']"><i class="fa fa-home"></i> Trang chủ</a>
            </li>
            <li class="breadcrumb-item" *ngFor="let item of items; let last = last"
                [class.active]="last" [attr.aria-current]="last ? 'page' : null">
              <a *ngIf="!last && item.url" [routerLink]="item.url">{{ item.label }}</a>
              <span *ngIf="last">{{ item.label }}</span>
            </li>
          </ol>
        </nav>
      </div>
    </div>
  </div>
</div>
